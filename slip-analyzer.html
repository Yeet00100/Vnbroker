<style>
:root {
  --navy:    #0b1f4a;
  --navy2:   #122660;
  --blue:    #1a5fd4;
  --orange:  #f97316;
  --orange2: #ea6500;
  --gold:    #c8922a;
  --white:   #ffffff;
  --bg:      #eef2fb;
  --border:  #d6e0f5;
  --text:    #0b1f4a;
  --muted:   #5a6a8a;
  --green:   #22c55e;
  --green-l: #f0fdf4;
  --green-b: #bbf7d0;
  --red:     #ef4444;
  --card-sh: 0 4px 20px rgba(11,31,74,.1);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ══ TOPBAR ══ */
.topbar {
  background: linear-gradient(160deg, #0b1f4a 0%, #0f2d6b 60%, #122f78 100%);
  padding: 0 18px;
  height: 68px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 3px 24px rgba(11,31,74,.5);
}

/* gold line at bottom of topbar */
.topbar::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--orange), var(--gold), transparent);
}

/* ══ LOGO ══ */
.logo { display:flex; align-items:center; gap:12px; }
.logo-svg { width:44px; height:44px; flex-shrink:0; filter: drop-shadow(0 2px 8px rgba(249,115,22,.4)); }

.logo-text { line-height:1.15; }
.logo-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 800;
  color: var(--white);
  letter-spacing: 1.5px;
  text-shadow: 0 1px 6px rgba(0,0,0,.3);
}
.logo-sub {
  font-size: 9px; font-weight: 600;
  color: var(--gold);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.status-badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(200,146,42,.35);
  padding: 5px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
  color: rgba(255,255,255,.85);
  letter-spacing: .5px;
}
.badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 6px #4ade80;
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity:1; } 50% { opacity:.4; }
}

/* ══ PAGE ══ */
.page { max-width: 480px; margin: 0 auto; padding: 18px 14px 44px; }

/* ══ SECTION ══ */
.sec {
  background: var(--white);
  border-radius: 18px;
  border: 1px solid var(--border);
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: var(--card-sh);
}
.sec-head {
  padding: 14px 18px 13px;
  border-bottom: 1px solid #edf2ff;
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, #f7f9ff 0%, #eef2fb 100%);
}
.sec-icon  { font-size: 17px; }
.sec-title { font-size: 14px; font-weight: 700; color: var(--navy); letter-spacing: .2px; }
.sec-body  { padding: 16px 18px 18px; }

/* ══ UPLOAD ══ */
.up-area {
  border: 2px dashed #bfcfed;
  border-radius: 14px; background: #f7f9ff;
  overflow: hidden; transition: all .2s;
}
.up-area.drag { border-color: var(--blue); background: #eef3ff; }
.up-btns { display: grid; grid-template-columns: 1fr 1fr; }
.up-btn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 7px; padding: 24px 10px;
  cursor: pointer; position: relative; transition: background .15s;
}
.up-btn:first-child { border-right: 1px dashed #bfcfed; }
.up-btn:hover { background: #eef3ff; }
.up-btn input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.up-emoji { font-size: 30px; }
.up-lbl { font-size: 13px; font-weight: 700; color: var(--navy); }
.up-sub { font-size: 11px; color: var(--muted); }
.up-drop { text-align:center; padding:9px; font-size:11px; color:#94a3b8; border-top:1px dashed #bfcfed; }

.preview-box { display:none; position:relative; border-radius:14px; overflow:hidden; border:1px solid var(--border); }
.preview-box img { width:100%; max-height:260px; object-fit:contain; background:#f1f5f9; display:block; }
.preview-x {
  position:absolute; top:8px; right:8px;
  width:30px; height:30px; border-radius:50%;
  background:rgba(11,31,74,.6); border:none;
  color:#fff; font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(6px);
}

/* ══ READ BUTTON ══ */
.read-btn {
  width:100%; margin-top:14px; padding:16px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
  color:#fff; border:none; border-radius:14px;
  font-family:'Sarabun',sans-serif;
  font-size:16px; font-weight:700;
  cursor:pointer; transition:all .25s;
  display:flex; align-items:center; justify-content:center; gap:9px;
  box-shadow: 0 4px 18px rgba(26,95,212,.35);
  position:relative; overflow:hidden; letter-spacing:.3px;
}
.read-btn::before {
  content:'';
  position:absolute; top:0; left:-100%; width:60%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
  transition:left .5s;
}
.read-btn:hover:not(:disabled)::before { left:150%; }
.read-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 28px rgba(26,95,212,.45); }
.read-btn:active:not(:disabled) { transform:translateY(0); }
.read-btn:disabled { background:#dde6f5; color:#94a3b8; cursor:not-allowed; box-shadow:none; }
.read-btn.analyzing {
  background: linear-gradient(135deg, #0f2d6b 0%, var(--blue) 100%);
}

/* ══ FIELDS ══ */
.fields-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.fields-grid .full { grid-column:1/-1; }
.fg { display:flex; flex-direction:column; gap:5px; }
.fl { font-size:11px; font-weight:700; color:var(--muted); padding-left:3px; letter-spacing:.5px; text-transform:uppercase; }

.fi {
  width:100%; padding:11px 13px;
  border:1.5px solid var(--border); border-radius:10px;
  background:#f8faff; font-family:'Sarabun',sans-serif;
  font-size:14px; font-weight:500; color:var(--text);
  outline:none; transition:all .2s;
}
.fi::placeholder { color:#b8c8e0; font-weight:400; }
.fi:focus { border-color:var(--blue); background:#fff; box-shadow:0 0 0 3px rgba(26,95,212,.1); }
.fi.amt {
  font-size:22px; font-weight:800; text-align:center;
  color:var(--muted); font-family:'Chakra Petch',sans-serif;
  letter-spacing:.5px;
}
.fi.shim {
  background:linear-gradient(90deg,#f0f4ff 25%,#dde6f5 50%,#f0f4ff 75%);
  background-size:400px 100%; animation:sh 1.1s infinite;
  color:transparent !important; border-color:#dde6f5; pointer-events:none;
}
@keyframes sh { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
.fi.filled { border-color:var(--green-b); background:var(--green-l); font-weight:600; animation:pop .3s ease forwards; }
.fi.amt.filled { color:#15803d; background:linear-gradient(135deg,#f0fdf4,#dcfce7); }
.fi.filled:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(34,197,94,.12); }
@keyframes pop { 0%{transform:scale(.97);opacity:.5} 60%{transform:scale(1.01)} 100%{transform:scale(1);opacity:1} }

/* ══ SPINNER ══ */
.spin { display:inline-block; width:18px; height:18px; border:2.5px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:sp .65s linear infinite; }
@keyframes sp { to{transform:rotate(360deg)} }

/* ══ FOOTER ══ */
.footer { text-align:center; padding:10px 0 0; font-size:11px; color:#8a9ab8; letter-spacing:.5px; }
.footer b { color:var(--gold); }

/* ══ TOAST ══ */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); padding:12px 20px; border-radius:12px; font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px; z-index:999; white-space:nowrap; box-shadow:0 8px 28px rgba(0,0,0,.14); transition:transform .4s cubic-bezier(.16,1,.3,1); backdrop-filter:blur(8px); }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.s { background:rgba(240,253,244,.96); border:1.5px solid var(--green-b); color:#15803d; }
.toast.e { background:rgba(255,241,241,.96); border:1.5px solid #fca5a5; color:#dc2626; }
.toast.i { background:rgba(239,246,255,.96); border:1.5px solid #bfdbfe; color:var(--navy); }
</style>
</head>

<script>
const GROQ_KEY = "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";
const IDS = ['f-amount','f-date','f-time','f-sender','f-receiver','f-bank','f-ref'];
let b64 = null, busy = false;
let audioCtx = null;

// ── AUDIO ──
function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, type, dur, vol, delay = 0) {
  try {
    const ctx = getACtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    g.gain.setValueAtTime(0, ctx.currentTime + delay);
    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    o.start(ctx.currentTime + delay);
    o.stop(ctx.currentTime + delay + dur + 0.05);
  } catch(e) {}
}
function soundStart()   { beep(440,'sine',.12,.3); beep(550,'sine',.12,.2,.1); }
function soundSuccess() { beep(523,'sine',.15,.35,0); beep(659,'sine',.15,.35,.15); beep(784,'sine',.22,.4,.3); }
function soundError()   { beep(300,'sawtooth',.18,.25,0); beep(220,'sawtooth',.25,.25,.15); }

// ── IMAGE PREPROCESSING (Canvas — max sharpness) ──
function preprocessImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const cvs = document.getElementById('cvs');
      const ctx = cvs.getContext('2d');

      // ── Step 1: Scale to optimal size for OCR (max 1600px longest side)
      const MAX = 1600;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > MAX || h > MAX) {
        const r = Math.min(MAX / w, MAX / h);
        w = Math.round(w * r); h = Math.round(h * r);
      }
      // Minimum size
      if (w < 800) { const r = 800 / w; w = 800; h = Math.round(h * r); }
      cvs.width = w; cvs.height = h;

      // ── Step 2: Draw with imageSmoothingQuality = high
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, w, h);

      // ── Step 3: Get pixel data
      const imageData = ctx.getImageData(0, 0, w, h);
      const data = imageData.data;

      // ── Step 4: Contrast enhancement (S-curve)
      const contrast = 40; // 0-100
      const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
      for (let i = 0; i < data.length; i += 4) {
        data[i]   = Math.min(255, Math.max(0, factor * (data[i]   - 128) + 128));
        data[i+1] = Math.min(255, Math.max(0, factor * (data[i+1] - 128) + 128));
        data[i+2] = Math.min(255, Math.max(0, factor * (data[i+2] - 128) + 128));
      }

      // ── Step 5: Sharpening (Unsharp Mask via convolution kernel)
      // First put contrast-enhanced back
      ctx.putImageData(imageData, 0, 0);

      // Draw blurred copy to temp canvas
      const tmp = document.createElement('canvas');
      tmp.width = w; tmp.height = h;
      const tctx = tmp.getContext('2d');
      tctx.filter = 'blur(1px)';
      tctx.drawImage(cvs, 0, 0);

      // Get both image datas
      const sharp  = ctx.getImageData(0, 0, w, h);
      const blurry = tctx.getImageData(0, 0, w, h);
      const sd = sharp.data, bd = blurry.data;
      const amount = 1.8; // sharpening strength

      for (let i = 0; i < sd.length; i += 4) {
        sd[i]   = Math.min(255, Math.max(0, sd[i]   + amount * (sd[i]   - bd[i])));
        sd[i+1] = Math.min(255, Math.max(0, sd[i+1] + amount * (sd[i+1] - bd[i+1])));
        sd[i+2] = Math.min(255, Math.max(0, sd[i+2] + amount * (sd[i+2] - bd[i+2])));
      }
      ctx.putImageData(sharp, 0, 0);

      // ── Step 6: Brightness boost (slips are often dark photos)
      const brightData = ctx.getImageData(0, 0, w, h);
      const bd2 = brightData.data;
      const brightness = 12;
      for (let i = 0; i < bd2.length; i += 4) {
        bd2[i]   = Math.min(255, bd2[i]   + brightness);
        bd2[i+1] = Math.min(255, bd2[i+1] + brightness);
        bd2[i+2] = Math.min(255, bd2[i+2] + brightness);
      }
      ctx.putImageData(brightData, 0, 0);

      // ── Step 7: Export as high-quality JPEG
      const dataUrl = cvs.toDataURL('image/jpeg', 0.96);
      resolve(dataUrl.split(',')[1]);
    };
    img.onerror = () => {
      // fallback: read raw
      const r = new FileReader();
      r.onload = e => resolve(e.target.result.split(',')[1]);
      r.readAsDataURL(file);
    };
    img.src = URL.createObjectURL(file);
  });
}

// ── FILE HANDLER ──
function onFile(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    // show preview (original)
    document.getElementById('pi').src = ev.target.result;
    document.getElementById('ua').style.display = 'none';
    document.getElementById('pb').style.display = 'block';
    document.getElementById('readBtn').disabled = false;
    resetFields();
  };
  r.readAsDataURL(f);
  // store file for preprocessing later
  window._pendingFile = f;
}

function resetFile() {
  window._pendingFile = null;
  b64 = null;
  document.getElementById('ua').style.display = 'block';
  document.getElementById('pb').style.display = 'none';
  document.getElementById('readBtn').disabled = true;
  resetFields();
}

// drag & drop
const ua = document.getElementById('ua');
ua.addEventListener('dragover', e => { e.preventDefault(); ua.classList.add('drag'); });
ua.addEventListener('dragleave', () => ua.classList.remove('drag'));
ua.addEventListener('drop', e => {
  e.preventDefault(); ua.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) onFile({ target: { files: [f] } });
});

// ── FIELD HELPERS ──
function resetFields() {
  IDS.forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
    el.className  = 'fi' + (id === 'f-amount' ? ' amt' : '');
    el.placeholder = id === 'f-amount' ? '0.00' : '—';
    el.readOnly   = (id === 'f-amount');
  });
}
function shimFields() {
  IDS.forEach(id => {
    const el = document.getElementById(id);
    el.value = ''; el.placeholder = '';
    el.className = 'fi' + (id === 'f-amount' ? ' amt' : '') + ' shim';
  });
}
function fillField(id, val, delay) {
  setTimeout(() => {
    const el     = document.getElementById(id);
    const hasVal = val && String(val).trim() !== '';
    el.className   = 'fi' + (id === 'f-amount' ? ' amt' : '') + (hasVal ? ' filled' : '');
    el.value       = hasVal ? val : '';
    el.placeholder = id === 'f-amount' ? '0.00' : '—';
    el.readOnly    = (id === 'f-amount');
  }, delay);
}

// ── ANALYZE ──
async function doAnalyze() {
  if (busy) return;
  if (!window._pendingFile) { showToast('⚠️ กรุณาเลือกรูปก่อน', 'i'); return; }

  try { getACtx().resume(); } catch(e) {}
  soundStart();

  busy = true;
  const btn = document.getElementById('readBtn');
  btn.disabled = true;
  btn.classList.add('analyzing');
  btn.innerHTML = '<div class="spin"></div> กำลังประมวลผล...';
  shimFields();

  try {
    // Preprocess image
    btn.innerHTML = '<div class="spin"></div> กำลังเตรียมรูป...';
    b64 = await preprocessImage(window._pendingFile);

    btn.innerHTML = '<div class="spin"></div> AI กำลังอ่านสลิป...';

    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + GROQ_KEY
      },
      body: JSON.stringify({
        model: 'meta-llama/llama-4-scout-17b-16e-instruct',
        max_tokens: 1000,
        temperature: 0.1,
        response_format: { type: 'json_object' },
        messages: [{
          role: 'user',
          content: [
            { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + b64 } },
            { type: 'text', text: `คุณคือระบบอ่านสลิปโอนเงินของธนาคารไทยที่แม่นยำสูง

สลิปธนาคารไทยมักมีข้อมูลดังนี้:
- ชื่อธนาคารผู้โอน (เช่น กสิกรไทย, ไทยพาณิชย์, กรุงเทพ, กรุงไทย, ทหารไทย)
- ชื่อผู้โอน และเลขบัญชีผู้โอน
- ชื่อผู้รับ และเลขบัญชีผู้รับ (อาจเป็น PromptPay/พร้อมเพย์ หรือเลขบัญชี)
- จำนวนเงิน (บาท) มักแสดงเป็น "1,234.56 บาท" หรือ "THB 1,234.56"
- วันที่และเวลา เช่น "29 เม.ย. 69" หรือ "29/04/2569" หรือ "29 Apr 2026"
- เลขที่รายการ/อ้างอิง มักขึ้นต้นด้วยตัวเลขหรือตัวอักษร

กรุณาอ่านข้อมูลจากสลิปนี้อย่างละเอียด แล้วตอบเป็น JSON เท่านั้น ไม่มีข้อความอื่น:
{
  "amount": "ตัวเลขเท่านั้น ไม่มีหน่วย เช่น 1855.00",
  "date": "วันที่ภาษาไทย เช่น 29 เม.ย. 2568",
  "time": "เวลา เช่น 06:44",
  "sender": "ชื่อผู้โอนเต็ม",
  "receiver": "ชื่อผู้รับเต็ม",
  "bank": "ชื่อธนาคารหรือช่องทาง",
  "ref": "เลขที่รายการหรืออ้างอิง"
}
ถ้าไม่พบข้อมูลใดให้ใส่ "" อย่าเดา` }
          ]
        }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) throw new Error('API Key ไม่ถูกต้อง');
      if (res.status === 429) throw new Error('เกิน Rate Limit กรุณารอสักครู่');
      throw new Error(err.error?.message || 'error ' + res.status);
    }

    const j   = await res.json();
    const raw = j.choices?.[0]?.message?.content;
    if (!raw) throw new Error('ไม่ได้รับข้อมูลจาก AI');

    const d = JSON.parse(raw);
    const amtFmt = d.amount
      ? parseFloat(d.amount).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      : '';

    fillField('f-amount',   amtFmt,     0);
    fillField('f-date',     d.date,     70);
    fillField('f-time',     d.time,     130);
    fillField('f-sender',   d.sender,   190);
    fillField('f-receiver', d.receiver, 250);
    fillField('f-bank',     d.bank,     310);
    fillField('f-ref',      d.ref,      370);

    soundSuccess();
    showToast('✅ อ่านสลิปสำเร็จ', 's');

  } catch (err) {
    resetFields();
    soundError();
    showToast('❌ ' + (err.message || 'เกิดข้อผิดพลาด'), 'e');
    console.error(err);
  } finally {
    busy = false;
    btn.disabled = false;
    btn.classList.remove('analyzing');
    btn.innerHTML = '✦ อ่านสลิปด้วย AI';
  }
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── PWA Icon: generate from SVG and set as apple-touch-icon ──
(function() {
  try {
    const svg = document.querySelector('.logo-svg').outerHTML;
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const url  = URL.createObjectURL(blob);
    const img  = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = 180; c.height = 180;
      const ctx = c.getContext('2d');
      // Background
      ctx.fillStyle = '#0b1f4a';
      const r = 32;
      ctx.beginPath();
      ctx.moveTo(r,0); ctx.lineTo(180-r,0); ctx.quadraticCurveTo(180,0,180,r);
      ctx.lineTo(180,180-r); ctx.quadraticCurveTo(180,180,180-r,180);
      ctx.lineTo(r,180); ctx.quadraticCurveTo(0,180,0,180-r);
      ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
      ctx.closePath(); ctx.fill();
      // Draw SVG logo centered
      ctx.drawImage(img, 22, 18, 136, 145);
      document.getElementById('appIcon').href = c.toDataURL('image/png');
      URL.revokeObjectURL(url);
    };
    img.src = url;
  } catch(e) {}
})();
</script>
