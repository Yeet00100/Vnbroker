<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สแกนสลิป</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --green: #22c55e; --green-light: #f0fdf4; --green-border: #bbf7d0;
  --blue: #2563eb; --blue-light: #eff6ff;
  --border: #e5e7eb; --text: #111827; --muted: #6b7280; --red: #ef4444;
}
body { font-family: 'Sarabun', sans-serif; background: #f3f4f6; color: var(--text); min-height: 100vh; }

.topbar {
  background: #fff; border-bottom: 1px solid var(--border);
  height: 56px; padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
}
.brand { display: flex; align-items: center; gap: 9px; }
.brand-icon { width: 34px; height: 34px; border-radius: 9px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 17px; }
.brand-name { font-size: 15px; font-weight: 700; }
.brand-sub  { font-size: 11px; color: var(--muted); }

.sec { background: #fff; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
.sec-head { padding: 14px 16px 12px; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; gap: 8px; }
.sec-icon  { font-size: 16px; }
.sec-title { font-size: 14px; font-weight: 700; }
.sec-body  { padding: 14px 16px 16px; }

.up-area { border: 2px dashed #d1d5db; border-radius: 12px; background: #fafafa; overflow: hidden; transition: all .2s; }
.up-area.drag { border-color: var(--blue); background: var(--blue-light); }
.up-btns { display: grid; grid-template-columns: 1fr 1fr; }
.up-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 22px 10px; cursor: pointer; position: relative; transition: background .15s; }
.up-btn:first-child { border-right: 1px dashed #e5e7eb; }
.up-btn:hover { background: var(--blue-light); }
.up-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.up-emoji { font-size: 28px; }
.up-lbl { font-size: 13px; font-weight: 700; }
.up-sub { font-size: 11px; color: var(--muted); }
.up-drop { text-align: center; padding: 8px; font-size: 11px; color: #9ca3af; border-top: 1px dashed #e5e7eb; }

.preview-box { display: none; position: relative; }
.preview-box img { width: 100%; max-height: 260px; object-fit: contain; background: #f3f4f6; display: block; border-radius: 12px; }
.preview-x { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background: rgba(0,0,0,.5); border: none; color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.read-btn { width: 100%; margin-top: 12px; padding: 15px; background: var(--blue); color: #fff; border: none; border-radius: 12px; font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.read-btn:hover:not(:disabled) { background: #1d4ed8; box-shadow: 0 4px 14px rgba(37,99,235,.3); }
.read-btn:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }

.fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fields-grid .full { grid-column: 1/-1; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fl { font-size: 12px; font-weight: 600; color: var(--muted); padding-left: 2px; }

.fi { width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 10px; background: #fff; font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 400; color: var(--text); outline: none; transition: border-color .2s, background .3s; }
.fi::placeholder { color: #d1d5db; }
.fi:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(147,197,253,.2); }
.fi.amt { font-size: 20px; font-weight: 700; text-align: center; color: var(--muted); }

.fi.shim { background: linear-gradient(90deg,#f3f4f6 25%,#e5e7eb 50%,#f3f4f6 75%); background-size: 400px 100%; animation: sh 1.1s infinite; color: transparent !important; border-color: #e5e7eb; pointer-events: none; }
@keyframes sh { 0%{background-position:-400px 0} 100%{background-position:400px 0} }

.fi.filled { border-color: var(--green-border); background: var(--green-light); font-weight: 600; animation: pop .3s ease forwards; }
.fi.amt.filled { color: var(--green); font-weight: 800; }
.fi.filled:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(34,197,94,.12); }
@keyframes pop { 0%{transform:scale(.97);opacity:.5} 60%{transform:scale(1.01)} 100%{transform:scale(1);opacity:1} }

.spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: sp .6s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(70px); padding: 11px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; z-index: 999; white-space: nowrap; box-shadow: 0 6px 18px rgba(0,0,0,.1); transition: transform .35s cubic-bezier(.16,1,.3,1); }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.s { background: #fff; border: 1.5px solid var(--green); color: #15803d; }
.toast.e { background: #fff; border: 1.5px solid var(--red);   color: #dc2626; }
.toast.i { background: #fff; border: 1.5px solid var(--blue);  color: var(--blue); }

.page { max-width: 480px; margin: 0 auto; padding: 16px 14px 40px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-icon">🧾</div>
    <div>
      <div class="brand-name">สแกนสลิป</div>
      <div class="brand-sub">บันทึกการโอนเงิน</div>
    </div>
  </div>
</div>

<div class="page">

  <div class="sec">
    <div class="sec-head"><span class="sec-icon">🖼️</span><span class="sec-title">อัปโหลดสลิป</span></div>
    <div class="sec-body">

      <div class="up-area" id="ua">
        <div class="up-btns">
          <label class="up-btn">
            <input type="file" accept="image/*" capture="environment" onchange="onFile(event)">
            <span class="up-emoji">📷</span>
            <span class="up-lbl">ถ่ายรูป</span>
            <span class="up-sub">เปิดกล้อง</span>
          </label>
          <label class="up-btn">
            <input type="file" accept="image/*" onchange="onFile(event)">
            <span class="up-emoji">🖼️</span>
            <span class="up-lbl">เลือกจากคลัง</span>
            <span class="up-sub">ไฟล์ในเครื่อง</span>
          </label>
        </div>
        <div class="up-drop">หรือลากวางรูปที่นี่</div>
      </div>

      <div class="preview-box" id="pb">
        <img id="pi" src="" alt="">
        <button class="preview-x" onclick="resetFile()">✕</button>
      </div>

      <button class="read-btn" id="readBtn" onclick="doAnalyze()" disabled>
        ✦ อ่านสลิปด้วย AI
      </button>
    </div>
  </div>

  <div class="sec">
    <div class="sec-head"><span class="sec-icon">✏️</span><span class="sec-title">ข้อมูลการโอน</span></div>
    <div class="sec-body">
      <div class="fields-grid">
        <div class="fg full">
          <div class="fl">จำนวนเงิน (บาท)</div>
          <input class="fi amt" id="f-amount" placeholder="0.00" readonly>
        </div>
        <div class="fg">
          <div class="fl">วันที่</div>
          <input class="fi" id="f-date" placeholder="—">
        </div>
        <div class="fg">
          <div class="fl">เวลา</div>
          <input class="fi" id="f-time" placeholder="—">
        </div>
        <div class="fg full">
          <div class="fl">ผู้โอน (จาก)</div>
          <input class="fi" id="f-sender" placeholder="—">
        </div>
        <div class="fg full">
          <div class="fl">ผู้รับ (ถึง)</div>
          <input class="fi" id="f-receiver" placeholder="—">
        </div>
        <div class="fg full">
          <div class="fl">ธนาคาร / ช่องทาง</div>
          <input class="fi" id="f-bank" placeholder="—">
        </div>
        <div class="fg full">
          <div class="fl">เลขที่รายการ / อ้างอิง</div>
          <input class="fi" id="f-ref" placeholder="—">
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const GROQ_KEY = "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";

let b64 = null, busy = false;
const IDS = ['f-amount','f-date','f-time','f-sender','f-receiver','f-bank','f-ref'];

function onFile(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    b64 = ev.target.result.split(',')[1];
    document.getElementById('pi').src = ev.target.result;
    document.getElementById('ua').style.display = 'none';
    document.getElementById('pb').style.display = 'block';
    document.getElementById('readBtn').disabled = false;
    resetFields();
  };
  r.readAsDataURL(f);
}

function resetFile() {
  b64 = null;
  document.getElementById('ua').style.display = 'block';
  document.getElementById('pb').style.display = 'none';
  document.getElementById('readBtn').disabled = true;
  resetFields();
}

const ua = document.getElementById('ua');
ua.addEventListener('dragover', e => { e.preventDefault(); ua.classList.add('drag'); });
ua.addEventListener('dragleave', () => ua.classList.remove('drag'));
ua.addEventListener('drop', e => {
  e.preventDefault(); ua.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) onFile({ target: { files: [f] } });
});

function resetFields() {
  IDS.forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
    el.className  = 'fi' + (id === 'f-amount' ? ' amt' : '');
    el.placeholder = id === 'f-amount' ? '0.00' : '—';
    el.readOnly   = (id === 'f-amount');
  });
}

function shimFields() {
  IDS.forEach(id => {
    const el = document.getElementById(id);
    el.value = ''; el.placeholder = '';
    el.className = 'fi' + (id === 'f-amount' ? ' amt' : '') + ' shim';
  });
}

function fillField(id, val, delay) {
  setTimeout(() => {
    const el     = document.getElementById(id);
    const hasVal = val && String(val).trim() !== '';
    el.className   = 'fi' + (id === 'f-amount' ? ' amt' : '') + (hasVal ? ' filled' : '');
    el.value       = hasVal ? val : '';
    el.placeholder = id === 'f-amount' ? '0.00' : '—';
    el.readOnly    = (id === 'f-amount');
  }, delay);
}

async function doAnalyze() {
  if (!b64 || busy) return;
  busy = true;
  const btn = document.getElementById('readBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> กำลังอ่านสลิป...';
  shimFields();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + GROQ_KEY
      },
      body: JSON.stringify({
        model: 'meta-llama/llama-4-scout-17b-16e-instruct',
        max_tokens: 800,
        response_format: { type: 'json_object' },
        messages: [{
          role: 'user',
          content: [
            { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + b64 } },
            { type: 'text', text: `อ่านสลิปโอนเงินนี้แล้วตอบ JSON เท่านั้น:
{
  "amount": "ยอดเงิน ตัวเลขเท่านั้น เช่น 1855.00",
  "date": "วันที่ เช่น 29 เม.ย. 2568",
  "time": "เวลา เช่น 06:44",
  "sender": "ชื่อผู้โอน",
  "receiver": "ชื่อผู้รับ",
  "bank": "ธนาคารหรือช่องทาง",
  "ref": "เลขที่รายการ"
}
ถ้าไม่พบใส่ ""` }
          ]
        }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) throw new Error('API Key ไม่ถูกต้อง');
      if (res.status === 429) throw new Error('เกิน Rate Limit กรุณารอสักครู่');
      throw new Error(err.error?.message || 'error ' + res.status);
    }

    const j = await res.json();
    const d = JSON.parse(j.choices[0].message.content);

    const amtFmt = d.amount
      ? parseFloat(d.amount).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      : '';

    fillField('f-amount',   amtFmt,     0);
    fillField('f-date',     d.date,     70);
    fillField('f-time',     d.time,     130);
    fillField('f-sender',   d.sender,   190);
    fillField('f-receiver', d.receiver, 250);
    fillField('f-bank',     d.bank,     310);
    fillField('f-ref',      d.ref,      370);

    showToast('✅ อ่านสลิปสำเร็จ', 's');

  } catch (err) {
    resetFields();
    showToast('❌ ' + (err.message || 'เกิดข้อผิดพลาด'), 'e');
    console.error(err);
  } finally {
    busy = false;
    btn.disabled = false;
    btn.innerHTML = '✦ อ่านสลิปด้วย AI';
  }
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
