<title>VNBroker — สแกนสลิป</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #0a2463;
  --navy2:  #0d3080;
  --blue:   #1a6cf6;
  --orange: #f97316;
  --orange2:#fb923c;
  --white:  #ffffff;
  --bg:     #f0f4ff;
  --border: #dde6f7;
  --text:   #0f172a;
  --muted:  #64748b;
  --green:  #22c55e;
  --green-l:#f0fdf4;
  --green-b:#bbf7d0;
  --red:    #ef4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Sarabun', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
}

/* ── TOPBAR ── */
.topbar {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  padding: 0 16px;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 20px rgba(10,36,99,.4);
}

/* LOGO */
.logo { display: flex; align-items: center; gap: 10px; }

.logo-icon {
  width: 40px; height: 40px;
  flex-shrink: 0;
}

.logo-text { line-height: 1.1; }
.logo-name {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 18px; font-weight: 700;
  color: var(--white);
  letter-spacing: 1px;
}
.logo-sub {
  font-size: 10px;
  color: rgba(255,255,255,.55);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.topbar-badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2);
  padding: 5px 11px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
  color: rgba(255,255,255,.9);
  backdrop-filter: blur(8px);
}
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; }

/* ── PAGE ── */
.page { max-width: 480px; margin: 0 auto; padding: 16px 14px 40px; }

/* ── SECTION ── */
.sec {
  background: var(--white);
  border-radius: 18px;
  border: 1px solid var(--border);
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(10,36,99,.06);
}

.sec-head {
  padding: 14px 18px 13px;
  border-bottom: 1px solid #f1f5ff;
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, #f8faff 0%, #f0f4ff 100%);
}
.sec-icon { font-size: 17px; }
.sec-title { font-size: 14px; font-weight: 700; color: var(--navy); }
.sec-body  { padding: 16px 18px 18px; }

/* ── UPLOAD ── */
.up-area {
  border: 2px dashed #c7d7f4;
  border-radius: 14px;
  background: #f8faff;
  overflow: hidden;
  transition: all .2s;
}
.up-area.drag { border-color: var(--blue); background: #eff5ff; }

.up-btns { display: grid; grid-template-columns: 1fr 1fr; }
.up-btn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 7px; padding: 24px 10px;
  cursor: pointer; position: relative;
  transition: background .15s;
}
.up-btn:first-child { border-right: 1px dashed #c7d7f4; }
.up-btn:hover { background: #eff5ff; }
.up-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.up-emoji { font-size: 30px; }
.up-lbl { font-size: 13px; font-weight: 700; color: var(--navy); }
.up-sub { font-size: 11px; color: var(--muted); }
.up-drop { text-align: center; padding: 9px; font-size: 11px; color: #94a3b8; border-top: 1px dashed #c7d7f4; }

.preview-box { display: none; position: relative; border-radius: 14px; overflow: hidden; }
.preview-box img { width: 100%; max-height: 260px; object-fit: contain; background: #f1f5f9; display: block; }
.preview-x {
  position: absolute; top: 8px; right: 8px;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(0,0,0,.5); border: none;
  color: #fff; font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}

/* ── READ BUTTON ── */
.read-btn {
  width: 100%; margin-top: 14px; padding: 16px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
  color: #fff; border: none; border-radius: 14px;
  font-family: 'Sarabun', sans-serif;
  font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 9px;
  box-shadow: 0 4px 16px rgba(26,108,246,.3);
  position: relative; overflow: hidden;
}
.read-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.1) 0%, transparent 100%);
}
.read-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(26,108,246,.4);
}
.read-btn:active:not(:disabled) { transform: translateY(0); }
.read-btn:disabled {
  background: #e2e8f0; color: #94a3b8;
  cursor: not-allowed; box-shadow: none; transform: none;
}

/* ── FIELDS ── */
.fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fields-grid .full { grid-column: 1/-1; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fl { font-size: 11px; font-weight: 700; color: var(--muted); padding-left: 3px; letter-spacing: .3px; text-transform: uppercase; }

.fi {
  width: 100%; padding: 11px 13px;
  border: 1.5px solid var(--border);
  border-radius: 10px; background: #f8faff;
  font-family: 'Sarabun', sans-serif;
  font-size: 14px; font-weight: 500; color: var(--text);
  outline: none; transition: all .2s;
}
.fi::placeholder { color: #cbd5e1; font-weight: 400; }
.fi:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 3px rgba(26,108,246,.1); }
.fi.amt {
  font-size: 22px; font-weight: 800;
  text-align: center; color: var(--muted);
  font-family: 'Chakra Petch', sans-serif;
}

/* shimmer */
.fi.shim {
  background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);
  background-size: 400px 100%; animation: sh 1.1s infinite;
  color: transparent !important; border-color: #e2e8f0; pointer-events: none;
}
@keyframes sh { 0%{background-position:-400px 0} 100%{background-position:400px 0} }

/* filled → green */
.fi.filled {
  border-color: var(--green-b); background: var(--green-l);
  font-weight: 600; animation: pop .3s ease forwards;
}
.fi.amt.filled {
  color: #15803d;
  background: linear-gradient(135deg, #f0fdf4, #dcfce7);
  border-color: var(--green-b);
}
.fi.filled:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(34,197,94,.12); }
@keyframes pop { 0%{transform:scale(.97);opacity:.5} 60%{transform:scale(1.01)} 100%{transform:scale(1);opacity:1} }

/* ── SPINNER ── */
.spin {
  display: inline-block; width: 18px; height: 18px;
  border: 2.5px solid rgba(255,255,255,.35);
  border-top-color: #fff; border-radius: 50%;
  animation: sp .65s linear infinite;
}
@keyframes sp { to { transform: rotate(360deg); } }

/* ── PULSE RING (while analyzing) ── */
@keyframes pulse-ring {
  0%   { transform: scale(1); opacity: .6; }
  100% { transform: scale(1.5); opacity: 0; }
}
.read-btn.analyzing::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 14px;
  border: 2px solid rgba(255,255,255,.5);
  animation: pulse-ring .9s ease-out infinite;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  padding: 12px 20px; border-radius: 12px;
  font-size: 14px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
  z-index: 999; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
  transition: transform .4s cubic-bezier(.16,1,.3,1);
  backdrop-filter: blur(8px);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.s { background: rgba(240,253,244,.95); border: 1.5px solid var(--green-b); color: #15803d; }
.toast.e { background: rgba(255,241,241,.95); border: 1.5px solid #fca5a5; color: #dc2626; }
.toast.i { background: rgba(239,246,255,.95); border: 1.5px solid #bfdbfe; color: var(--navy); }

/* ── FOOTER ── */
.footer {
  text-align: center;
  padding: 8px 0 0;
  font-size: 11px; color: #94a3b8;
  letter-spacing: .5px;
}
.footer span { color: var(--orange); font-weight: 700; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <!-- SVG LOGO -->
    <svg class="logo-icon" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <!-- Shield base -->
      <path d="M20 3 L34 9 L34 22 C34 30 20 37 20 37 C20 37 6 30 6 22 L6 9 Z"

      <!-- Shield shine -->
      <path d="M20 3 L34 9 L34 18 C34 18 28 14 20 14 C12 14 6 18 6 18 L6 9 Z"

<!-- PAGE -->
<div class="page">

  <!-- Upload -->
  <div class="sec">
    <div class="sec-head">
      <span class="sec-icon">🖼️</span>
      <span class="sec-title">อัปโหลดสลิป</span>

        <div class="up-btns">
          <label class="up-btn">

            <span class="up-emoji">📷</span>
            <span class="up-lbl">ถ่ายรูป</span>
            <span class="up-sub">เปิดกล้อง</span>
          </label>
          <label class="up-btn">
            <input type="file" accept="image/*" onchange="onFile(event)">
            <span class="up-emoji">🖼️</span>
            <span class="up-lbl">เลือกจากคลัง</span>
            <span class="up-sub">ไฟล์ในเครื่อง</span>
          </label>
        </div>
        <div class="up-drop">หรือลากวางรูปที่นี่</div>
      </div>

      <div class="preview-box" id="pb">
        <img id="pi" src="" alt="">
        <button class="preview-x" onclick="resetFile()">✕</button>

  <!-- Result -->
  <div class="sec">
    <div class="sec-head">
      <span class="sec-icon">✏️</span>
      <span class="sec-title">ข้อมูลการโอน</span>
    </div>
    <div class="sec-body">
      <div class="fields-grid">

        <div class="fg full">
          <div class="fl">จำนวนเงิน (บาท)</div>
          <input class="fi amt" id="f-amount" placeholder="0.00" readonly>
        </div>

        <div class="fg">
          <div class="fl">วันที่</div>
          <input class="fi" id="f-date" placeholder="—">
        </div>
        <div class="fg">
          <div class="fl">เวลา</div>
          <input class="fi" id="f-time" placeholder="—">
        </div>

        <div class="fg full">
          <div class="fl">ผู้โอน (จาก)</div>
          <input class="fi" id="f-sender" placeholder="—">
        </div>

      </div>
    </div>
  </div>

  <div class="footer">Powered by <span>VNBROKER</span> · AI Slip Scanner</div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── EMBEDDED KEY ──
const GROQ_KEY = "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";

// ── AUDIO ENGINE (Web Audio API — no files needed) ──
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBeep(freq, type, duration, vol, delay = 0) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + duration + 0.05);
  } catch(e) {}
}

// เสียงกดปุ่ม (start analyzing)
function soundStart() {
  playBeep(440, 'sine', 0.12, 0.3);
  playBeep(550, 'sine', 0.12, 0.2, 0.1);
}

// เสียงสำเร็จ (success — 3 notes ascending)
function soundSuccess() {
  playBeep(523, 'sine', 0.15, 0.35, 0.0);  // C
  playBeep(659, 'sine', 0.15, 0.35, 0.15); // E
  playBeep(784, 'sine', 0.22, 0.4,  0.3);  // G
}

// เสียง error
function soundError() {
  playBeep(300, 'sawtooth', 0.18, 0.25, 0.0);
  playBeep(220, 'sawtooth', 0.25, 0.25, 0.15);
}

// ── FIELDS ──
const IDS = ['f-amount','f-date','f-time','f-sender','f-receiver','f-bank','f-ref'];
let b64 = null, busy = false;

function onFile(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    b64 = ev.target.result.split(',')[1];
    document.getElementById('pi').src = ev.target.result;
    document.getElementById('ua').style.display = 'none';
    document.getElementById('pb').style.display = 'block';
    document.getElementById('readBtn').disabled = false;
    resetFields();
  };
  r.readAsDataURL(f);
}

function resetFile() {
  b64 = null;
  document.getElementById('ua').style.display = 'block';
  document.getElementById('pb').style.display = 'none';
  document.getElementById('readBtn').disabled = true;
  resetFields();
}

// drag & drop
const ua = document.getElementById('ua');
ua.addEventListener('dragover', e => { e.preventDefault(); ua.classList.add('drag'); });
ua.addEventListener('dragleave', () => ua.classList.remove('drag'));
ua.addEventListener('drop', e => {
  e.preventDefault(); ua.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) onFile({ target: { files: [f] } });
});

function resetFields() {
  IDS.forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
    el.className  = 'fi' + (id === 'f-amount' ? ' amt' : '');
    el.placeholder = id === 'f-amount' ? '0.00' : '—';
    el.readOnly   = (id === 'f-amount');
  });
}

function shimFields() {
  IDS.forEach(id => {
    const el = document.getElementById(id);
    el.value = ''; el.placeholder = '';
    el.className = 'fi' + (id === 'f-amount' ? ' amt' : '') + ' shim';
  });
}

function fillField(id, val, delay) {
  setTimeout(() => {
    const el     = document.getElementById(id);
    const hasVal = val && String(val).trim() !== '';
    el.className   = 'fi' + (id === 'f-amount' ? ' amt' : '') + (hasVal ? ' filled' : '');
    el.value       = hasVal ? val : '';
    el.placeholder = id === 'f-amount' ? '0.00' : '—';
    el.readOnly    = (id === 'f-amount');
  }, delay);
}

// ── ANALYZE ──
async function doAnalyze() {
  if (!b64 || busy) return;

  // unlock audio context on user gesture
  try { getAudioCtx().resume(); } catch(e) {}
  soundStart();

  busy = true;
  const btn = document.getElementById('readBtn');
  btn.disabled = true;
  btn.classList.add('analyzing');
  btn.innerHTML = '<div class="spin"></div> กำลังอ่านสลิป...';
  shimFields();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + GROQ_KEY
      },
      body: JSON.stringify({
        model: 'meta-llama/llama-4-scout-17b-16e-instruct',
        max_tokens: 800,
        response_format: { type: 'json_object' },
        messages: [{
          role: 'user',
          content: [
            { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + b64 } },
            { type: 'text', text: `อ่านสลิปโอนเงินนี้แล้วตอบ JSON เท่านั้น:
{
  "amount": "ยอดเงิน ตัวเลขเท่านั้น เช่น 1855.00",
  "date": "วันที่ เช่น 29 เม.ย. 2568",
  "time": "เวลา เช่น 06:44",
  "sender": "ชื่อผู้โอน",
  "receiver": "ชื่อผู้รับ",
  "bank": "ธนาคารหรือช่องทาง",
  "ref": "เลขที่รายการ"
}
ถ้าไม่พบใส่ ""` }
          ]
        }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) throw new Error('API Key ไม่ถูกต้อง');
      if (res.status === 429) throw new Error('เกิน Rate Limit กรุณารอสักครู่');
      throw new Error(err.error?.message || 'error ' + res.status);
    }

    const j   = await res.json();
    const raw = j.choices?.[0]?.message?.content;
    if (!raw) throw new Error('ไม่ได้รับข้อมูลจาก AI');

    const d = JSON.parse(raw);

    const amtFmt = d.amount
      ? parseFloat(d.amount).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      : '';

    fillField('f-amount',   amtFmt,     0);
    fillField('f-date',     d.date,     70);
    fillField('f-time',     d.time,     130);
    fillField('f-sender',   d.sender,   190);
    fillField('f-receiver', d.receiver, 250);
    fillField('f-bank',     d.bank,     310);
    fillField('f-ref',      d.ref,      370);

    soundSuccess();
    showToast('✅ อ่านสลิปสำเร็จ', 's');

  } catch (err) {
    resetFields();
    soundError();
    showToast('❌ ' + (err.message || 'เกิดข้อผิดพลาด'), 'e');
    console.error(err);
  } finally {
    busy = false;
    btn.disabled = false;
    btn.classList.remove('analyzing');
    btn.innerHTML = '✦ อ่านสลิปด้วย AI';
  }
}

// ── TOAST ──
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
