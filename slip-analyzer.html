.logo { display:flex; align-items:center; gap:12px; }

.status-badge { display:flex; align-items:center; gap:5px; background:rgba(255,255,255,.08); border:1px solid rgba(200,146,42,.35); padding:5px 12px; border-radius:20px; font-size:11px; font-weight:700; color:rgba(255,255,255,.85); letter-spacing:.5px; }
.badge-dot { width:6px; height:6px; border-radius:50%; background:#4ade80; box-shadow:0 0 6px #4ade80; animation:pdot 2s ease-in-out infinite; }

.sec { background:var(--white); border-radius:18px; border:1px solid var(--border); margin-bottom:14px; overflow:hidden; box-shadow:0 2px 12px rgba(10,36,99,.06); }

// ── Draw nav icon (Canvas) ──
function drawNavIcon(canvas, size) {
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,size,size);
  const u = size/400;
  const SX=200, SY=30, SW=158, SH=310;

  function shield(inset) {
    const x=SX*u, y=(SY+inset)*u, hw=(SW-inset)*u, h=(SH-inset*1.5)*u;
    ctx.beginPath();
    ctx.moveTo(x-hw+u*14,y); ctx.lineTo(x+hw-u*14,y);
    ctx.quadraticCurveTo(x+hw,y,x+hw,y+u*18);
    ctx.lineTo(x+hw,y+h*0.54);
    ctx.bezierCurveTo(x+hw,y+h*0.80,x+hw*0.5,y+h*0.93,x,y+h);
    ctx.bezierCurveTo(x-hw*0.5,y+h*0.93,x-hw,y+h*0.80,x-hw,y+h*0.54);
    ctx.lineTo(x-hw,y+u*18);
    ctx.quadraticCurveTo(x-hw,y,x-hw+u*14,y);
    ctx.closePath();
  }

  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=u*16; ctx.shadowOffsetY=u*6;
  const gG=ctx.createLinearGradient(0,SY*u,0,(SY+SH)*u);
  gG.addColorStop(0,'#f5dd88'); gG.addColorStop(.35,'#c8922a'); gG.addColorStop(1,'#7a5010');
  ctx.fillStyle=gG; shield(0); ctx.fill(); ctx.restore();

  const gB=ctx.createLinearGradient(u*60,SY*u,u*340,(SY+SH)*u);
  gB.addColorStop(0,'#1e6ee8'); gB.addColorStop(.5,'#0f3580'); gB.addColorStop(1,'#0b1f4a');
  ctx.fillStyle=gB; shield(9); ctx.fill();

  ctx.strokeStyle='rgba(200,146,42,0.3)'; ctx.lineWidth=u*2; shield(18); ctx.stroke();

  const gS=ctx.createLinearGradient(0,SY*u,0,(SY+SH*0.4)*u);
  gS.addColorStop(0,'rgba(255,255,255,0.18)'); gS.addColorStop(1,'rgba(255,255,255,0)');
  ctx.save(); shield(9); ctx.clip();
  ctx.fillStyle=gS; ctx.fillRect((SX-SW)*u,SY*u,SW*2*u,SH*0.4*u); ctx.restore();

  ctx.strokeStyle='#fff'; ctx.lineWidth=u*19; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(u*85,u*110); ctx.lineTo(u*148,u*230); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(u*194,u*110); ctx.lineTo(u*148,u*230); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(u*218,u*110); ctx.lineTo(u*218,u*230); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(u*290,u*110); ctx.lineTo(u*290,u*230); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(u*218,u*110); ctx.lineTo(u*290,u*230); ctx.stroke();

  const bG=ctx.createLinearGradient(u*85,0,u*290,0);
  bG.addColorStop(0,'#fb923c'); bG.addColorStop(.5,'#f97316'); bG.addColorStop(1,'#fb923c');
  ctx.fillStyle=bG;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(u*85,u*244,u*204,u*7,u*3);
  else ctx.rect(u*85,u*244,u*204,u*7);
  ctx.fill();

  ctx.fillStyle='rgba(249,115,22,0.7)';
  ctx.beginPath(); ctx.arc(u*200,u*296,u*5,0,Math.PI*2); ctx.fill();
}

// ── Audio ──
function getACtx() {
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function beep(f,t,d,v,delay=0) {
  try {
    const ctx=getACtx(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=t; o.frequency.setValueAtTime(f,ctx.currentTime+delay);
    g.gain.setValueAtTime(0,ctx.currentTime+delay);
    g.gain.linearRampToValueAtTime(v,ctx.currentTime+delay+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+d);
    o.start(ctx.currentTime+delay); o.stop(ctx.currentTime+delay+d+0.05);
  } catch(e){}
}
function soundStart()   { beep(440,'sine',.12,.3); beep(550,'sine',.12,.2,.1); }
function soundSuccess() { beep(523,'sine',.15,.35,0); beep(659,'sine',.15,.35,.15); beep(784,'sine',.22,.4,.3); }
function soundError()   { beep(300,'sawtooth',.18,.25,0); beep(220,'sawtooth',.25,.25,.15); }

function onFile(e) {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    document.getElementById('pi').src=ev.target.result;
    document.getElementById('ua').style.display='none';
    document.getElementById('pb').style.display='block';
    document.getElementById('readBtn').disabled=false;
    resetFields();
  };
  r.readAsDataURL(f);
  window._pendingFile=f;
}
function resetFile() {
  window._pendingFile=null;
  document.getElementById('ua').style.display='block';
  document.getElementById('pb').style.display='none';
  document.getElementById('readBtn').disabled=true;
  resetFields();
}
const ua=document.getElementById('ua');
ua.addEventListener('dragover',e=>{e.preventDefault();ua.classList.add('drag');});
ua.addEventListener('dragleave',()=>ua.classList.remove('drag'));
ua.addEventListener('drop',e=>{
  e.preventDefault(); ua.classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/')) onFile({target:{files:[f]}});
});

function shimFields() {

function fillField(id,val,delay) {

    el.readOnly=(id==='f-amount');
  },delay);
}

// ── Preprocess ──
function preprocessImage(file) {
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d');
      const MAX=1600; let w=img.naturalWidth,h=img.naturalHeight;
      if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
      if(w<800){const r=800/w;w=800;h=Math.round(h*r);}
      cvs.width=w; cvs.height=h;
      ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
      ctx.drawImage(img,0,0,w,h);
      const id=ctx.getImageData(0,0,w,h),d=id.data,cf=40;
      const f=(259*(cf+255))/(255*(259-cf));
      for(let i=0;i<d.length;i+=4){d[i]=Math.min(255,Math.max(0,f*(d[i]-128)+128));d[i+1]=Math.min(255,Math.max(0,f*(d[i+1]-128)+128));d[i+2]=Math.min(255,Math.max(0,f*(d[i+2]-128)+128));}
      ctx.putImageData(id,0,0);
      const tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h;
      const tctx=tmp.getContext('2d'); tctx.filter='blur(1px)'; tctx.drawImage(cvs,0,0);
      const sh=ctx.getImageData(0,0,w,h),bl=tctx.getImageData(0,0,w,h);
      const sd=sh.data,bd=bl.data,amt=1.8;
      for(let i=0;i<sd.length;i+=4){sd[i]=Math.min(255,Math.max(0,sd[i]+amt*(sd[i]-bd[i])));sd[i+1]=Math.min(255,Math.max(0,sd[i+1]+amt*(sd[i+1]-bd[i+1])));sd[i+2]=Math.min(255,Math.max(0,sd[i+2]+amt*(sd[i+2]-bd[i+2])));}
      ctx.putImageData(sh,0,0);
      const bi=ctx.getImageData(0,0,w,h),bd2=bi.data;
      for(let i=0;i<bd2.length;i+=4){bd2[i]=Math.min(255,bd2[i]+12);bd2[i+1]=Math.min(255,bd2[i+1]+12);bd2[i+2]=Math.min(255,bd2[i+2]+12);}
      ctx.putImageData(bi,0,0);
      resolve(cvs.toDataURL('image/jpeg',0.96).split(',')[1]);
    };
    img.onerror=()=>{const r=new FileReader();r.onload=e=>resolve(e.target.result.split(',')[1]);r.readAsDataURL(file);};
    img.src=URL.createObjectURL(file);
  });
}

// ── Analyze ──
async function doAnalyze() {
  if(busy||!window._pendingFile) return;
  try{getACtx().resume();}catch(e){}
  soundStart(); busy=true;
  const btn=document.getElementById('readBtn');
  btn.disabled=true; btn.innerHTML='<div class="spin"></div> กำลังประมวลผล...';
  shimFields();
  try {
    btn.innerHTML='<div class="spin"></div> กำลังเตรียมรูป...';
    const b64=await preprocessImage(window._pendingFile);
    btn.innerHTML='<div class="spin"></div> AI กำลังอ่านสลิป...';
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({
        model:'meta-llama/llama-4-scout-17b-16e-instruct',
        max_tokens:1000, temperature:0.1,
        response_format:{type:'json_object'},
        messages:[{role:'user',content:[
          {type:'image_url',image_url:{url:'data:image/jpeg;base64,'+b64}},
          {type:'text',text:`คุณคือระบบอ่านสลิปโอนเงินของธนาคารไทยที่แม่นยำสูง

สลิปธนาคารไทยมักมีข้อมูลดังนี้:
- ชื่อธนาคารผู้โอน (เช่น กสิกรไทย, ไทยพาณิชย์, กรุงเทพ, กรุงไทย, ทหารไทย)
- ชื่อผู้โอน และเลขบัญชีผู้โอน
- ชื่อผู้รับ และเลขบัญชีผู้รับ (อาจเป็น PromptPay/พร้อมเพย์ หรือเลขบัญชี)
- จำนวนเงิน (บาท) มักแสดงเป็น "1,234.56 บาท" หรือ "THB 1,234.56"
- วันที่และเวลา เช่น "29 เม.ย. 69" หรือ "29/04/2569"
- เลขที่รายการ/อ้างอิง

ตอบเป็น JSON เท่านั้น:
{
  "amount": "ตัวเลขเท่านั้น เช่น 1855.00",
  "date": "วันที่ภาษาไทย เช่น 29 เม.ย. 2568",
  "time": "เวลา เช่น 06:44",
  "sender": "ชื่อผู้โอนเต็ม",
  "receiver": "ชื่อผู้รับเต็ม",
  "bank": "ชื่อธนาคารหรือช่องทาง",
  "ref": "เลขที่รายการหรืออ้างอิง"
}
ถ้าไม่พบใส่ "" อย่าเดา`}
        ]}]
      })
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      if(res.status===401) throw new Error('API Key ไม่ถูกต้อง');
      if(res.status===429) throw new Error('เกิน Rate Limit กรุณารอสักครู่');
      throw new Error(err.error?.message||'error '+res.status);
    }
    const j=await res.json();
    const raw=j.choices?.[0]?.message?.content;
    if(!raw) throw new Error('ไม่ได้รับข้อมูลจาก AI');
    const d=JSON.parse(raw);
    const amtFmt=d.amount?parseFloat(d.amount).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}):'';
    fillField('f-amount',amtFmt,0); fillField('f-date',d.date,70); fillField('f-time',d.time,130);
    fillField('f-sender',d.sender,190); fillField('f-receiver',d.receiver,250);
    fillField('f-bank',d.bank,310); fillField('f-ref',d.ref,370);
    soundSuccess(); showToast('✅ อ่านสลิปสำเร็จ','s');
  } catch(err) {
    resetFields(); soundError();
    showToast('❌ '+(err.message||'เกิดข้อผิดพลาด'),'e');
  } finally {
    busy=false; btn.disabled=false; btn.innerHTML='✦ อ่านสลิปด้วย AI';
  }
}

function showToast(msg,type) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3500);
}
</script>
